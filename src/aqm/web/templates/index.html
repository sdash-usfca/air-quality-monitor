<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Air Quality</title>
  <style>
    :root {
      --bg: #0f0f13; --card: #1c1c24; --card2: #16161d; --fg: #ececec; --muted: #8a8a96;
      --good: #2ecc71; --moderate: #f1c40f; --poor: #e74c3c; --unknown: #7f8c8d; --accent: #4aa3df;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--fg);
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif; }
    header { display: flex; align-items: baseline; justify-content: space-between;
      flex-wrap: wrap; gap: 8px; padding: 18px 24px 8px; }
    h1 { margin: 0; font-size: 20px; font-weight: 600; }
    #updated { color: var(--muted); font-size: 13px; }

    /* Summary banner */
    .banner { margin: 8px 24px 4px; border-radius: 16px; padding: 18px 22px;
      display: flex; align-items: center; gap: 18px; background: var(--card);
      border-left: 10px solid var(--unknown); }
    .banner.good { border-left-color: var(--good); }
    .banner.moderate { border-left-color: var(--moderate); }
    .banner.poor { border-left-color: var(--poor); }
    .banner .dot { width: 16px; height: 16px; border-radius: 50%; background: var(--unknown); flex: none; }
    .banner.good .dot { background: var(--good); } .banner.moderate .dot { background: var(--moderate); }
    .banner.poor .dot { background: var(--poor); }
    .banner .headline { font-size: 22px; font-weight: 700; }
    .banner .sub { color: var(--muted); font-size: 14px; margin-top: 2px; }

    /* Cards */
    .grid { display: grid; gap: 12px; padding: 12px 24px;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    .card { background: var(--card); border-radius: 14px; padding: 14px; border-left: 6px solid var(--unknown); }
    .card.good { border-left-color: var(--good); } .card.moderate { border-left-color: var(--moderate); }
    .card.poor { border-left-color: var(--poor); }
    .card .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; }
    .card .value { font-size: 32px; font-weight: 700; line-height: 1.1; margin-top: 4px; }
    .card .unit { font-size: 14px; color: var(--muted); font-weight: 500; margin-left: 3px; }
    .card .age { color: var(--muted); font-size: 11px; margin-top: 8px; }

    /* Controls */
    .controls { padding: 8px 24px 0; display: flex; align-items: center; gap: 8px; }
    .controls .lbl { color: var(--muted); font-size: 13px; margin-right: 4px; }
    .rangebtn { background: var(--card); color: var(--fg); border: 1px solid #2c2c38;
      border-radius: 999px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
    .rangebtn.active { background: var(--accent); border-color: var(--accent); color: #06121b; font-weight: 600; }

    /* Charts */
    .charts { padding: 12px 24px 32px; display: grid; gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
    .chart-box { background: var(--card2); border-radius: 14px; padding: 14px; }
    .chart-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
    .chart-head .ctitle { font-size: 15px; font-weight: 600; }
    .chart-head .csub { color: var(--muted); font-size: 11px; }
    .cdesc { color: var(--muted); font-size: 12px; line-height: 1.35; margin: -2px 0 8px; }
    footer { color: var(--muted); font-size: 12px; padding: 0 24px 24px; }
  </style>
</head>
<body>
  <header>
    <h1>🌬️ Air Quality</h1>
    <div id="updated">connecting…</div>
  </header>

  <div id="banner" class="banner">
    <div class="dot"></div>
    <div>
      <div class="headline" id="banner-headline">—</div>
      <div class="sub" id="banner-sub">waiting for readings…</div>
    </div>
  </div>

  <section id="cards" class="grid"></section>

  <div class="controls">
    <span class="lbl">History:</span>
    <button class="rangebtn" data-hours="1">1h</button>
    <button class="rangebtn active" data-hours="24">24h</button>
    <button class="rangebtn" data-hours="168">7d</button>
  </div>

  <section id="charts" class="charts"></section>

  <footer>Live data from this device · cards refresh every 5s</footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script>
    const COLORS = { good: '#2ecc71', moderate: '#f1c40f', poor: '#e74c3c', unknown: '#7f8c8d' };
    const ACCENT = '#4aa3df';
    const RANK = { good: 0, moderate: 1, poor: 2 };

    let currentHours = 24;
    let metricsMeta = [];
    const charts = {};
    let latestByKey = {};

    function ago(s) {
      if (s < 60) return s + 's ago';
      if (s < 3600) return Math.floor(s / 60) + 'm ago';
      return Math.floor(s / 3600) + 'h ago';
    }
    function fmtTime(x) {
      const d = new Date(x);
      if (currentHours >= 48) return (d.getMonth() + 1) + '/' + d.getDate();
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // ---- Cards + banner (from /api/latest) ----
    async function refreshLatest() {
      try {
        const data = await (await fetch('/api/latest')).json();
        latestByKey = {};
        data.metrics.forEach(m => latestByKey[m.key] = m);

        const cards = document.getElementById('cards');
        if (!data.metrics.length) {
          document.getElementById('updated').textContent = 'no readings yet — is the collector running?';
          return;
        }
        cards.innerHTML = data.metrics.map(m => `
          <div class="card ${m.status}">
            <div class="label">${m.label}</div>
            <div class="value">${m.display}<span class="unit">${m.unit}</span></div>
            <div class="age">${ago(m.age_seconds)}</div>
          </div>`).join('');

        updateBanner(data.metrics);
        document.getElementById('updated').textContent = 'updated ' + new Date().toLocaleTimeString();
      } catch (e) {
        document.getElementById('updated').textContent = 'connection lost…';
      }
    }

    function updateBanner(metrics) {
      const graded = metrics.filter(m => m.status in RANK);
      const banner = document.getElementById('banner');
      const headline = document.getElementById('banner-headline');
      const sub = document.getElementById('banner-sub');
      if (!graded.length) { banner.className = 'banner'; headline.textContent = '—'; sub.textContent = 'no graded metrics'; return; }
      let worst = 'good';
      graded.forEach(m => { if (RANK[m.status] > RANK[worst]) worst = m.status; });
      banner.className = 'banner ' + worst;
      headline.textContent = 'Air Quality: ' + worst.charAt(0).toUpperCase() + worst.slice(1);
      if (worst === 'good') {
        sub.textContent = 'All clear — everything within healthy limits.';
      } else {
        const drivers = graded.filter(m => m.status === worst)
          .map(m => `${m.label} ${m.display} ${m.unit}`).join(' · ');
        sub.textContent = 'Driven by: ' + drivers;
      }
    }

    // ---- Charts ----
    function buildCharts() {
      const container = document.getElementById('charts');
      container.innerHTML = '';
      metricsMeta.forEach(meta => {
        const thr = meta.good_max != null
          ? `good ≤ ${meta.good_max} · moderate ≤ ${meta.moderate_max} ${meta.unit}`
          : meta.unit;
        const box = document.createElement('div');
        box.className = 'chart-box';
        box.innerHTML = `<div class="chart-head"><span class="ctitle">${meta.label}</span>
          <span class="csub">${thr}</span></div>
          <div class="cdesc">${meta.description}</div>
          <canvas id="chart-${meta.key}" height="150"></canvas>`;
        container.appendChild(box);
        charts[meta.key] = makeChart(meta);
      });
    }

    function thrDataset(value, color) {
      return { value, data: [], borderColor: color, borderWidth: 1, borderDash: [5, 4],
               pointRadius: 0, fill: false, tension: 0 };
    }
    function makeChart(meta) {
      if (!window.Chart) return null;
      const ctx = document.getElementById('chart-' + meta.key).getContext('2d');
      const ds = [{ data: [], borderColor: ACCENT, backgroundColor: ACCENT + '22',
                    borderWidth: 2, pointRadius: 0, fill: true, tension: 0.25 }];
      if (meta.good_max != null) ds.push(thrDataset(meta.good_max, COLORS.good));
      if (meta.moderate_max != null) ds.push(thrDataset(meta.moderate_max, COLORS.moderate));
      return new Chart(ctx, {
        type: 'line', data: { datasets: ds },
        options: {
          animation: false, plugins: { legend: { display: false } },
          interaction: { intersect: false, mode: 'index' },
          scales: {
            x: { type: 'linear', ticks: { color: '#8a8a96', maxTicksLimit: 6, callback: fmtTime }, grid: { color: '#23232c' } },
            y: { ticks: { color: '#8a8a96' }, grid: { color: '#23232c' } }
          }
        }
      });
    }

    function fillChart(meta, points) {
      const chart = charts[meta.key];
      if (!chart) return;
      const pts = points.map(p => ({ x: p[0] * 1000, y: p[1] }));
      const st = (latestByKey[meta.key] || {}).status;
      const c = COLORS[st] || ACCENT;
      chart.data.datasets[0].data = pts;
      chart.data.datasets[0].borderColor = c;
      chart.data.datasets[0].backgroundColor = c + '22';
      const x0 = pts.length ? pts[0].x : Date.now() - currentHours * 3600000;
      const x1 = pts.length ? pts[pts.length - 1].x : Date.now();
      for (let i = 1; i < chart.data.datasets.length; i++) {
        const d = chart.data.datasets[i];
        d.data = [{ x: x0, y: d.value }, { x: x1, y: d.value }];
      }
      chart.update('none');
    }

    async function refreshHistory() {
      try {
        const data = await (await fetch('/api/history_all?hours=' + currentHours)).json();
        metricsMeta.forEach(meta => fillChart(meta, data.series[meta.key] || []));
      } catch (e) { /* keep last good charts */ }
    }

    function setRange(hours, btn) {
      currentHours = hours;
      document.querySelectorAll('.rangebtn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      refreshHistory();
    }

    async function init() {
      try {
        metricsMeta = (await (await fetch('/api/metrics')).json()).metrics;
      } catch (e) { metricsMeta = []; }
      buildCharts();
      document.querySelectorAll('.rangebtn').forEach(b =>
        b.addEventListener('click', () => setRange(parseInt(b.dataset.hours, 10), b)));
      await refreshLatest();
      await refreshHistory();
      setInterval(refreshLatest, 5000);
      setInterval(refreshHistory, 60000);
    }
    window.addEventListener('load', init);
  </script>
</body>
</html>
